# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [25.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci
    - run: npm run build --if-present

    - name: Run Tests
      run: npm test -- --reporters=jest-junit  # generates XML report

    - name: Test Reporter
      # You may pin to the exact commit or the version.
      # uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2
      uses: dorny/test-reporter@v3.0.0
      with:
        # Name or regex of artifact containing test results
        artifact: # optional
        # Name of the check run
        name:  Jest Tests
        # Comma-separated list of paths to test results
   
        path: junit.xml
        # The fast-glob library that is internally used interprets backslashes as escape characters.    
        reporter: jest-junit
        # Limits which test suites are listed. Supported options:

    - name: Run Tests Github Actions UI
      run: npm test -- --json --outputFile=test-results.json
      
    - name: Debug - List files
      if: always()
      run: ls -la *.json || echo "No JSON files found"
    
    - name: Write Summary
      if: always()
      run: |
        TOTAL=$(grep -o 'tests="[0-9]*"' junit.xml | head -1 | grep -o '[0-9]*')
        FAILED=$(grep -o 'failures="[0-9]*"' junit.xml | head -1 | grep -o '[0-9]*')
        PASSED=$((TOTAL - FAILED))   # ✅ actual passed count
    
        echo "## Test Results 🧪" >> $GITHUB_STEP_SUMMARY
        echo "| Status | Count |" >> $GITHUB_STEP_SUMMARY
        echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| ✅ Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
        echo "| ❌ Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY
        echo "| 📋 Total  | $TOTAL  |" >> $GITHUB_STEP_SUMMARY
        
